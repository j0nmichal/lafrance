<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>US Cold — Locations &amp; Services</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0A1628;
      --accent: #00D4FF;
      --text: #F0F6FA;
      --mist: #A8BFD0;
      --card-bg: rgba(200,232,245,0.03);
      --card-border: rgba(200,232,245,0.08);
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      background-color: var(--bg);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.025) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    .page-wrapper {
      position: relative;
      z-index: 1;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Header ── */
    header {
      padding: 44px 64px 28px;
      flex-shrink: 0;
    }

    .eyebrow {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.35em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    h1 {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(44px, 5.5vw, 76px);
      font-weight: 400;
      letter-spacing: 0.06em;
      color: var(--text);
      line-height: 1;
      margin-bottom: 28px;
    }

    .search-wrapper {
      display: flex;
      align-items: center;
      gap: 10px;
      max-width: 440px;
      position: relative;
    }

    .search-icon {
      position: absolute;
      left: 12px;
      color: var(--mist);
      opacity: 0.5;
      pointer-events: none;
    }

    .search-input {
      background: rgba(200,232,245,0.04);
      border: 1px solid rgba(200,232,245,0.1);
      color: var(--text);
      font-family: 'IBM Plex Sans', sans-serif;
      font-size: 13px;
      padding: 10px 16px 10px 38px;
      border-radius: 4px;
      width: 100%;
      outline: none;
      transition: border-color 0.2s, background 0.2s;
    }
    .search-input::placeholder { color: var(--mist); opacity: 0.45; }
    .search-input:focus {
      border-color: rgba(0,212,255,0.35);
      background: rgba(200,232,245,0.06);
    }

    /* ── Marquee ── */
    .marquee-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      min-height: 0;
      padding: 8px 0 20px;
    }

    .marquee-outer {
      overflow: hidden;
      -webkit-mask-image: linear-gradient(to right, transparent 0%, black 10%, black 90%, transparent 100%);
      mask-image: linear-gradient(to right, transparent 0%, black 10%, black 90%, transparent 100%);
      cursor: default;
    }

    .marquee-track {
      display: flex;
      gap: 18px;
      width: max-content;
      padding: 16px 0;
      animation: marquee 220s linear infinite;
    }

    .marquee-track.paused,
    .marquee-track:hover {
      animation-play-state: paused;
    }

    @keyframes marquee {
      from { transform: translateX(0); }
      to   { transform: translateX(-50%); }
    }

    /* ── Search Results Grid ── */
    .search-results {
      display: none;
      flex: 1;
      overflow-y: auto;
      padding: 20px 64px 36px;
      gap: 16px;
      flex-wrap: wrap;
      align-content: flex-start;
    }

    .search-results.active { display: flex; }

    .no-results {
      width: 100%;
      text-align: center;
      color: var(--mist);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      padding: 48px 0;
      opacity: 0.5;
    }

    /* ── Facility Card ── */
    .facility-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-top: 2px solid transparent;
      border-radius: 6px;
      width: 292px;
      flex-shrink: 0;
      padding: 22px 20px 18px;
      transition: border-top-color 0.2s, background 0.2s;
    }

    .facility-card:hover {
      border-top-color: var(--accent);
      background: rgba(200,232,245,0.055);
    }

    .card-state {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 0.18em;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 3px;
    }

    .card-city {
      font-size: 15px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 1px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-name {
      font-size: 11px;
      color: var(--mist);
      opacity: 0.7;
      margin-bottom: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-stats {
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 14px;
    }

    .card-stat {
      font-size: 11px;
      color: var(--mist);
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .card-stat strong {
      color: var(--text);
      font-weight: 500;
    }

    .stat-icon {
      width: 12px;
      height: 12px;
      flex-shrink: 0;
      opacity: 0.5;
    }

    .card-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

    .badge {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 8.5px;
      font-weight: 500;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 3px 7px;
      border-radius: 2px;
      white-space: nowrap;
    }

    .badge-rail    { background: rgba(0,212,255,0.1);   color: #00D4FF; border: 1px solid rgba(0,212,255,0.22); }
    .badge-freeze  { background: rgba(96,200,255,0.08); color: #7dd3f8; border: 1px solid rgba(96,200,255,0.18); }
    .badge-auto    { background: rgba(139,92,246,0.09); color: #a78bfa; border: 1px solid rgba(139,92,246,0.18); }
    .badge-organic { background: rgba(52,211,153,0.07); color: #6ee7b7; border: 1px solid rgba(52,211,153,0.16); }
    .badge-default { background: rgba(168,191,208,0.07); color: var(--mist); border: 1px solid rgba(168,191,208,0.14); }

    /* ── Loading ── */
    .loading-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--mist);
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.12em;
      opacity: 0.6;
    }

    .dot { animation: pulse 1.4s ease-in-out infinite; }
    .dot:nth-child(2) { animation-delay: 0.2s; }
    .dot:nth-child(3) { animation-delay: 0.4s; }
    @keyframes pulse { 0%,80%,100% { opacity: 0.1; } 40% { opacity: 1; } }

    .error-state {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f87171;
      font-family: 'IBM Plex Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
    }

    /* ── Footer ── */
    .page-footer {
      padding: 12px 64px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      border-top: 1px solid rgba(200,232,245,0.04);
    }

    .footer-count {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.1em;
      color: var(--mist);
      opacity: 0.35;
    }

    .hover-hint {
      font-family: 'IBM Plex Mono', monospace;
      font-size: 10px;
      letter-spacing: 0.08em;
      color: var(--mist);
      opacity: 0.25;
    }
  </style>
</head>
<body>
<div class="page-wrapper">

  <header>
    <div class="eyebrow">US COLD</div>
    <h1>LOCATIONS &amp; SERVICES</h1>
    <div class="search-wrapper">
      <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
      </svg>
      <input type="text" class="search-input" id="search-input"
        placeholder="City, state, or capability — rail, organic, quick freeze…">
    </div>
  </header>

  <div class="loading-state" id="loading-state">
    Loading<span class="dot">.</span><span class="dot">.</span><span class="dot">.</span>
  </div>

  <div class="error-state" id="error-state" style="display:none">
    Failed to load facilities. Check your connection and try again.
  </div>

  <div class="marquee-section" id="marquee-section" style="display:none">
    <div class="marquee-outer">
      <div class="marquee-track" id="marquee-track"></div>
    </div>
  </div>

  <div class="search-results" id="search-results"></div>

  <footer class="page-footer">
    <span class="footer-count" id="facility-count"></span>
    <span class="hover-hint" id="hover-hint">hover to pause</span>
  </footer>

</div>

<script>
const SUPABASE_URL = 'https://ypqeekmwqkafknajxuki.supabase.co';
const SUPABASE_KEY = 'sb_publishable_KZ6JO3EYjDCPkjzp8Ygs3A_iVQqFB81';

let allFacilities = [];

async function fetchFacilities() {
  const res = await fetch(
    `${SUPABASE_URL}/rest/v1/facilities?published=eq.true&select=*&order=name.asc`,
    { headers: { 'apikey': SUPABASE_KEY } }
  );
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}

function formatPallets(n) {
  if (!n) return null;
  return `${Number(n).toLocaleString()} pallet positions`;
}

function formatTemp(min, max) {
  if (min == null && max == null) return null;
  if (min != null && max != null) return `${min}°F to ${max}°F`;
  if (min != null) return `From ${min}°F`;
  return `To ${max}°F`;
}

function buildBadges(f) {
  const b = [];
  if (f.rail_access) {
    b.push({ label: f.rail_carrier ? `Rail — ${f.rail_carrier}` : 'Rail Access', cls: 'badge-rail' });
  }
  if (f.quick_freeze) {
    b.push({ label: f.quick_freeze_auto ? 'Auto Quick Freeze' : 'Quick Freeze', cls: 'badge-freeze' });
  }
  if (f.automated)     b.push({ label: 'Automated',      cls: 'badge-auto' });
  if (f.organic)       b.push({ label: 'Organic',        cls: 'badge-organic' });
  if (f.repack)        b.push({ label: 'Repack',         cls: 'badge-default' });
  if (f.export_import) b.push({ label: 'Export / Import',cls: 'badge-default' });
  if (f.brcgs)         b.push({ label: 'BRCGS',          cls: 'badge-default' });
  if (f.layer_pick)    b.push({ label: 'Layer Pick',     cls: 'badge-default' });
  if (f.dedicated)     b.push({ label: 'Dedicated',      cls: 'badge-default' });
  return b;
}

function cardHTML(f) {
  const pallets = formatPallets(f.pallet_positions);
  const temp    = formatTemp(f.temp_min_f, f.temp_max_f);
  const badges  = buildBadges(f);

  const palletsRow = pallets
    ? `<div class="card-stat"><strong>${pallets}</strong></div>`
    : `<div class="card-stat" style="opacity:0.45">Contact for capacity</div>`;

  const tempRow = temp
    ? `<div class="card-stat">${temp}</div>`
    : '';

  const badgesHTML = badges.length
    ? `<div class="card-badges">${badges.map(b => `<span class="badge ${b.cls}">${b.label}</span>`).join('')}</div>`
    : '';

  return `
    <div class="facility-card">
      <div class="card-state">${esc(f.state) }</div>
      <div class="card-city">${esc(f.city)  }</div>
      <div class="card-name">${esc(f.name)  }</div>
      <div class="card-stats">${palletsRow}${tempRow}</div>
      ${badgesHTML}
    </div>`;
}

function esc(s) {
  if (!s) return '';
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/"/g,'&quot;');
}

function matchesFacility(f, q) {
  q = q.toLowerCase().trim();
  if (!q) return true;
  const text = [
    f.city, f.state, f.name, f.rail_carrier,
    f.rail_access    ? 'rail rail access'      : '',
    f.quick_freeze   ? 'quick freeze'          : '',
    f.automated      ? 'automated automation'  : '',
    f.organic        ? 'organic'               : '',
    f.repack         ? 'repack'                : '',
    f.export_import  ? 'export import'         : '',
    f.brcgs          ? 'brcgs'                 : '',
    f.layer_pick     ? 'layer pick'            : '',
    f.dedicated      ? 'dedicated'             : '',
    f.usda           ? 'usda'                  : '',
    f.fda            ? 'fda'                   : '',
    f.sqf            ? 'sqf'                   : '',
  ].filter(Boolean).join(' ').toLowerCase();
  return text.includes(q);
}

function initMarquee(facilities) {
  const track = document.getElementById('marquee-track');
  const html  = facilities.map(cardHTML).join('');
  track.innerHTML = html + html;
}

function renderSearch(query) {
  const marqueeSection = document.getElementById('marquee-section');
  const searchResults  = document.getElementById('search-results');
  const hoverHint      = document.getElementById('hover-hint');
  const countEl        = document.getElementById('facility-count');

  if (!query.trim()) {
    marqueeSection.style.display = '';
    searchResults.classList.remove('active');
    hoverHint.style.display = '';
    countEl.textContent = `${allFacilities.length} active facilities`;
    return;
  }

  marqueeSection.style.display = 'none';
  hoverHint.style.display = 'none';
  searchResults.classList.add('active');

  const matches = allFacilities.filter(f => matchesFacility(f, query));
  countEl.textContent = `${matches.length} of ${allFacilities.length} facilities`;

  if (matches.length === 0) {
    searchResults.innerHTML = '<div class="no-results">No facilities match your search.</div>';
  } else {
    searchResults.innerHTML = matches.map(cardHTML).join('');
  }
}

async function init() {
  try {
    allFacilities = await fetchFacilities();

    document.getElementById('loading-state').style.display  = 'none';
    document.getElementById('marquee-section').style.display = '';
    document.getElementById('facility-count').textContent    = `${allFacilities.length} active facilities`;

    initMarquee(allFacilities);

    document.getElementById('search-input').addEventListener('input', e => {
      renderSearch(e.target.value);
    });

  } catch (err) {
    console.error(err);
    document.getElementById('loading-state').style.display = 'none';
    document.getElementById('error-state').style.display   = '';
  }
}

init();
</script>
</body>
</html>
